<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ACC INVESTMENT - Logowanie</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
padding:20px;
}

.container{
width:100%;
max-width:400px;
border:2px solid gold;
border-radius:20px;
padding:30px 20px;
text-align:center;
box-shadow:0 0 15px rgba(0,0,0,0.1);
}

h1{
color:gold;
margin-bottom:25px;
font-size:28px;
}

input{
width:100%;
padding:14px;
margin-bottom:15px;
border:2px solid gold;
border-radius:12px;
font-size:16px;
outline:none;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:gold;
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
justify-content:center;
align-items:center;
}

.popup-content{
background:white;
padding:25px;
border-radius:20px;
text-align:center;
border:2px solid gold;
width:90%;
max-width:300px;
}

.popup-content p{
color:gold;
font-weight:600;
margin-bottom:15px;
}

.popup-content button{
background:gold;
}
</style>
</head>

<body>

<div class="container">
<h1>ACC INVESTMENT</h1>

<input type="text" id="name" value="Szymon Krajnieswki" readonly>

<input type="email" id="email" value="zbombi19@gmail.com" readonly>

<button onclick="login()">Zaloguj się</button>
</div>

<div class="popup" id="popup">
<div class="popup-content">
<p>Logowanie pomyślne</p>
<button onclick="goHome()">Przejdź dalej</button>
</div>
</div>

<script>
function login(){
document.getElementById("popup").style.display="flex";
}

function goHome(){
window.location.href="homepage.html";
}
</script>

</body>
</html>
