<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wypłata</title>

<style>
body{
font-family:Poppins,sans-serif;
background:white;
padding:20px;
}

.container{
max-width:400px;
margin:auto;
border:2px solid gold;
border-radius:20px;
padding:25px;
}

h1{
text-align:center;
color:gold;
margin-bottom:20px;
}

input,select{
width:100%;
padding:14px;
margin-top:12px;
border:2px solid gold;
border-radius:12px;
font-size:15px;
}

.amount{
font-size:25px;
font-weight:bold;
text-align:center;
color:black;
margin-top:20px;
}

button{
width:100%;
padding:14px;
margin-top:15px;
background:gold;
color:white;
border:none;
border-radius:12px;
font-size:16px;
}

.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
justify-content:center;
align-items:center;
}

.popup-content{
background:white;
padding:25px;
border-radius:20px;
border:2px solid gold;
text-align:center;
width:90%;
max-width:300px;
}

.popup-content p{
color:gold;
font-weight:bold;
margin-bottom:15px;
}
</style>
</head>

<body>

<div class="container">

<h1>Przelew bankowy</h1>

<input type="text" placeholder="Numer konta bankowego">

<input type="text" placeholder="Nazwa konta">

<select>
<option>PKO Bank Polski</option>
<option>mBank</option>
<option>Santander Bank Polska</option>
<option>ING Bank Śląski</option>
<option>Bank Pekao</option>
<option>Alior Bank</option>
<option>Millennium Bank</option>
<option>BNP Paribas Polska</option>
<option>Citi Handlowy</option>
<option>Credit Agricole Polska</option>
<option>Getin Bank</option>
<option>Bank Pocztowy</option>
<option>Nest Bank</option>
<option>Plus Bank</option>
</select>

<div class="amount">0 zł</div>

<button onclick="showPopup()">Wypłać</button>

<button onclick="location.href='homepage.html'">Powrót</button>

</div>

<div class="popup" id="popup">
<div class="popup-content">
<p>Aktywuj konto przed dokonaniem wypłaty</p>
<button onclick="closePopup()">OK</button>
</div>
</div>

<script>
function showPopup(){
document.getElementById('popup').style.display='flex';
}

function closePopup(){
document.getElementById('popup').style.display='none';
}
</script>

</body>
</html>
